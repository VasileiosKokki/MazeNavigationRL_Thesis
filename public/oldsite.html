<!DOCTYPE html>
<html>
<head>
	<title>Multiplayer game client</title>
	<style>
        body, html {
			width: 100%;
  			height: 100%;
  			margin: 0px;
  			border: 0;
			padding: 0;
  			overflow: hidden;
  			/*  Disable scrollbars */
  			display: block;
  			/* No floating content on sides */
        }
		canvas {
    		outline: none; /* Remove outline on focus */
  		}	
    </style>
</head>
<body>
	<canvas id="gameArea" tabindex="1"></canvas>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
	<script type="text/javascript">
		const canvas = document.getElementById('gameArea');
		const ctx = canvas.getContext('2d');


        // Set canvas size on page load
        updateCanvasSize();

		canvas.focus();     //poli kako gia to live preview 

		let zoomLevel = 1;
		let cameraX = 0;
		let cameraY = 0;
		var gonethroughhere = 0;
		var gonethroughhere2 = 0;
		//var thisclientId;
		let arrowUpPressed = false;
		let arrowDownPressed = false;
		let arrowRightPressed = false;
		let arrowLeftPressed = false;
		let isShooting = false;
		//var intervalID;
		var drawables = [];

		function Drawable(clientId, width, height, topLeftX, topLeftY, color, maxHealth, currentHealth, shape, type){
		this.clientId = clientId;
		this.width = Math.abs(width);
		this.height = Math.abs(height);
		this.topLeftX = topLeftX;
		this.topLeftY = topLeftY;
		this.color = color; 
		this.maxHealth = maxHealth; // Health Logic
		this.currentHealth = currentHealth; // Health Logic
		this.shape = shape;
		this.type = type;
};


		// ----------------------------------------- Start of Presentation Logic -----------------------------------------

		const websocket = new WebSocket('ws://localhost:3001/echo');
		websocket.addEventListener('message',function(event){
			if (!document.hidden){
			previousTime = Date.now();
			//const receivedArrayBuffer = Buffer.from(event.data).buffer;
			//const receivedUint8Array = new Uint8Array(receivedArrayBuffer);
			const blob = event.data;
			const fileReader = new FileReader();
			fileReader.readAsArrayBuffer(blob);
			fileReader.onload = function () {
  			// Get the ArrayBuffer from the FileReader result
  			const arrayBuffer = fileReader.result;

  			// Create a Uint8Array from the ArrayBuffer
  			const receivedUint8Array = new Uint8Array(arrayBuffer);

  			// Now you can use pako to decompress the data
  			const decompressedUint8Array = pako.inflate(receivedUint8Array);

  			// Convert decompressed data to string or process it as needed
  			const decoder = new TextDecoder();
  			const decompressedString = decoder.decode(decompressedUint8Array);
  			const message = JSON.parse(decompressedString);
			Presentation(message);

  			//console.log('Decompressed data:', message);
			};

			function Presentation(message){
			switch(message.type){
				case 'model':
						drawables.length = 0;
						arrayOfArrays = message.data;
						for (var i = 0; i < arrayOfArrays.length; i++) {
						var attributesArray = arrayOfArrays[i];
						var drawable = new Drawable(
						    attributesArray[0], // clientId
						    attributesArray[1], // width
						    attributesArray[2], // height
						    attributesArray[3], // topLeftX
						    attributesArray[4], // topLeftY
						    attributesArray[5], // color
						    attributesArray[6], // maxHealth
						    attributesArray[7], // currentHealth
						    attributesArray[8], // shape
						    attributesArray[9], // type
						);

						drawables.push(drawable);
						}
						//console.log(drawables);
						//var drawables = message.data;
						const drawablesToDrawHealth = [];
						ctx.clearRect(0,0,canvas.width,canvas.height);
						if (gonethroughhere2 == 0){
						ctx.fillStyle = "rgb(20, 20, 20)";
						gonethroughhere2 = 1;
						}
						ctx.fillRect(0, 0, canvas.width, canvas.height);	
						ctx.save();
						ctx.translate(cameraX, cameraY);
	
						
						
						var collumnX = gameBoundsWidth * zoomLevel / collumns // width
						var collumnY = gameBoundsHeight * zoomLevel
						var rowsX = gameBoundsWidth * zoomLevel
						var rowsY = gameBoundsHeight * zoomLevel / rows // height
						var x = 0;
						var y = 0;
						ctx.strokeStyle = "rgba(128, 128, 128, 0.1)";
						
						
						for (i = 0; i < collumns; i++){
							ctx.strokeRect(x,y,collumnX,collumnY);
							x += collumnX;
						}

						
						x = 0;
						for (j = 0; j < rows; j++){
							ctx.strokeRect(x,y,rowsX,rowsY);
							y += rowsY;
						}						
						

						ctx.strokeStyle = "green";
						ctx.strokeRect(0,0,gameBoundsWidth * zoomLevel,gameBoundsHeight * zoomLevel);


						var lastFillStyle;
						drawables.forEach(function(drawable){
							if (drawable.clientId == properId){  // gia ton paikth pou elegxoume
								recenterCamera(drawable);
							}
							if (drawable.type == 'player' || drawable.type == 'food'){
								if ((lastFillStyle != 'cyan' && drawable.color == 'cyan')){
			    					ctx.fillStyle = "rgb(135,206,250)";
									lastFillStyle = 'cyan'
								} else if ((lastFillStyle != 'red' && drawable.color == 'red')){
									ctx.fillStyle = "rgb(220,20,60)";
									lastFillStyle = 'red'
								}
								mainDraw(drawable);
								drawablesToDrawHealth.push(drawable);
							}
						});



						var timeSinceLastDraw = Date.now();
						for (let i = 0; i < drawables.length; i++) {
    						let drawable = drawables[i];
							if (drawable.type == 'projectile'){
								 if ((Date.now() - timeSinceLastDraw) > 8.5){ // ipersimantiko gia otan laggarei o client eksaitias ton drawable pou prepei na zografisei
								 	i += Math.floor(drawables.length/1000);
								 }
								// greatly improves performance
								if ((lastFillStyle != 'cyan' && drawable.color == 'cyan')){
			    					ctx.fillStyle = "rgb(135,206,250)";
									lastFillStyle = 'cyan'
								} else if ((lastFillStyle != 'red' && drawable.color == 'red')){
									ctx.fillStyle = "rgb(220,20,60)";
									lastFillStyle = 'red'
								}
								mainDraw(drawable);
							}				
						}


						// to xorizoume se 2 part gia na meiosoume ta ctx.fillstyle
						ctx.fillStyle = 'gray';
						drawablesToDrawHealth.forEach(function(drawable){
							if (drawable.currentHealth != drawable.maxHealth){
								drawHealthPart1(drawable);
							}
						});

						ctx.fillStyle = 'green';
						drawablesToDrawHealth.forEach(function(drawable){
							if (drawable.currentHealth != drawable.maxHealth){
								drawHealthPart2(drawable);
							}
						});

						


						ctx.restore();

					
					break;
				/*
				case 'disconnect':
					//alert("foo");
					thisclientId = thisclientId-1;
					break;
				case 'death':
					thisclientId = -1;
					break;
				case 'hi':
					alert('foo');
					break;
				*/
				case 'connected':
					if (gonethroughhere == 0){
						gonethroughhere = 1;
						properId = message.data.clientId;
						gameBoundsWidth = message.data.bounds.width;
						gameBoundsHeight = message.data.bounds.height;
						collumns = message.data.grid.cols;
						rows = message.data.grid.rows;
					}
					break;		
				default:
					break;
			}
			}
			}
		});


		// ----------------------------------------- End of Presentation Logic -----------------------------------------

	

		
		// ----------------------------------------- Start of Other Functions -----------------------------------------


		function updateCanvasSize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }


		// zoom in out
		function handleMouseWheel(event) {
      		const delta = Math.sign(event.deltaY);
			var zoomStep = 0.05;
      		if (delta === -1) {
				zoomLevel += zoomStep;
				if (zoomLevel >= 2.55) {
          		zoomLevel = 2.5;
				return;
        		} else { // mporoume na paralipsoume kai ta duo else efoson exoume to recenter function apla den einai toso smooth to zoom in out xoris auta
				const centerX = canvas.width / 2; // Center of the canvas
    			const centerY = canvas.height / 2;
   				cameraX = centerX - (centerX - cameraX) * (zoomLevel / (zoomLevel - zoomStep));
    			cameraY = centerY - (centerY - cameraY) * (zoomLevel / (zoomLevel - zoomStep));
				}


      		} else if (delta === 1) {
        		zoomLevel -= zoomStep;
				if (zoomLevel <= 0.65) {
          		zoomLevel = 0.7;
				return;
        		} else { // deutero else
				const centerX = canvas.width / 2; // Center of the canvas
    			const centerY = canvas.height / 2;
   				cameraX = centerX - (centerX - cameraX) * (zoomLevel / (zoomLevel + zoomStep));
    			cameraY = centerY - (centerY - cameraY) * (zoomLevel / (zoomLevel + zoomStep));
				}
      		}
    	}

		function mainDraw(drawable){
			const id = drawable.clientId;
			const x = drawable.topLeftX * zoomLevel;
            const y = drawable.topLeftY * zoomLevel;
            const width = drawable.width * zoomLevel;
            const height = drawable.height * zoomLevel;									

			/* xrhsimo gia debugging
			if (gonethroughhere == 1){
				gonethroughhere = 2;
				alert(clientId);
				alert(cameraX);
				alert(drawable.topLeftX);
			} 
			*/  
	

			if (drawable.shape == 'rectangle'){
				//ctx.beginPath();
				ctx.fillRect(x, y, width, height);
				//ctx.closePath();
								
			} else {   //  anything other than rectangle causes more lag

				// Draw a triangle shape <- sadly deprecated because collision was impossible to do
				/*
				ctx.beginPath();
  				ctx.moveTo(x, y+height);
  				ctx.lineTo(x+width, y+height);
  				ctx.lineTo(x+width/2, y);
  				ctx.closePath();
  				ctx.fill();
				*/
				// Draw an oval shape
								
  				const centerX = x + width / 2;
  				const centerY = y + height / 2;
  				const radiusX = width / 2;
  				const radiusY = height / 2;

  				ctx.beginPath();
  				ctx.ellipse(centerX, centerY, radiusX, radiusY, 0, 0, 2 * Math.PI);
  				//ctx.closePath();
 				ctx.fill();
								
								


			}							
		}


		function drawHealthPart1(drawable) {
    		const x = (drawable.topLeftX - drawable.width/2) * zoomLevel;
    		const y = (drawable.topLeftY + drawable.height + 10) * zoomLevel;
    		const width = 2 * drawable.width * zoomLevel;
   			const height = 5 * zoomLevel; // Height for displaying health bar




			drawable.healthBarX = x;
			drawable.healthBarY = y;
			drawable.healthBarWidth = width;
			drawable.healthBarHeight = height;
    		ctx.fillRect(drawable.healthBarX, drawable.healthBarY, drawable.healthBarWidth, drawable.healthBarHeight);
  		}


		function drawHealthPart2(drawable) {
			const healthPercentage = drawable.currentHealth / drawable.maxHealth; 
    		ctx.fillRect(drawable.healthBarX, drawable.healthBarY, drawable.healthBarWidth * healthPercentage, drawable.healthBarHeight);
  		}

	
		
		// swap tabs while key is pressed
		function handleVisibilityChange() {
      		if ((document.hidden) && ((arrowUpPressed || arrowDownPressed || arrowRightPressed || arrowLeftPressed) || isShooting)) {
				//clearInterval(intervalID);
				arrowUpPressed = false;
				arrowDownPressed = false;
				arrowRightPressed = false;
				arrowLeftPressed = false;
				const message = {type:'userAction',data:'ArrowNotClicked'};
				websocket.send(JSON.stringify(message));
				clearInterval(myInterval);
				const message2 = {type:'userProjectile',data:'MouseNotClicked'};
				websocket.send(JSON.stringify(message2));
      		}
    	}



		// recenter function, xoris auto olo to camera logic prepei na ginei xeirokinhta, eg cameraY += 4.3 otan paththei to up arrow
		function recenterCamera(drawable) {
			const x = drawable.topLeftX * zoomLevel;
			const y = drawable.topLeftY * zoomLevel;
			const width = drawable.width * zoomLevel;
			const height = drawable.height * zoomLevel;
		
			const centerX = x + width / 2;
			const centerY = y + height / 2;
		
			const canvasCenterX = canvas.width / 2;
			const canvasCenterY = canvas.height / 2;

			cameraX = canvasCenterX - centerX;
			cameraY = canvasCenterY - centerY;
		}


		function handleKeyAction() {  // koino kai gia to keydown kai gia to keyup event listener
			// oti einai prasino den xreiazetai pleon alla xreiazotan otan den eixame to recenter function


			//clearInterval(intervalID);

			// 3o epipedo - 3 koumpia
			if (arrowUpPressed && arrowRightPressed && arrowLeftPressed) {  
			//intervalID = setInterval(function () {cameraY += 4.3 * zoomLevel;}, 40);
    		const message = {type: 'userAction', data: 'ArrowUp'};
    		websocket.send(JSON.stringify(message));
  			} else if (arrowDownPressed && arrowRightPressed && arrowLeftPressed)  {
			//intervalID = setInterval(function () {cameraY -= 4.3 * zoomLevel;}, 40);
    		const message = {type: 'userAction', data: 'ArrowDown'};
    		websocket.send(JSON.stringify(message));
  			} else if (arrowRightPressed && arrowUpPressed && arrowDownPressed) {
			//intervalID = setInterval(function () {cameraX -= 4.3 * zoomLevel;}, 40);
    		const message = {type: 'userAction', data: 'ArrowRight'};
    		websocket.send(JSON.stringify(message));
  			} else if (arrowLeftPressed && arrowUpPressed && arrowDownPressed) {
			//intervalID = setInterval(function () {cameraX += 4.3 * zoomLevel;}, 40);
    		const message = {type: 'userAction', data: 'ArrowLeft'};
    		websocket.send(JSON.stringify(message));
			} else



			// 2o epipedo - 2 koumpia
			if ((arrowUpPressed && arrowDownPressed) || (arrowRightPressed && arrowLeftPressed)) {
				const message = {type:'userAction',data:'ArrowNotClicked'};
				websocket.send(JSON.stringify(message));
			} else  if (arrowUpPressed && arrowRightPressed){
				//intervalID = setInterval(function () {cameraY += 4.3 * zoomLevel,cameraX -= 4.3 * zoomLevel;}, 40);
				const message = {type:'userAction',data:'ArrowUp+Right'};
				websocket.send(JSON.stringify(message));
			} else if (arrowUpPressed && arrowLeftPressed){
				//intervalID = setInterval(function () {cameraY += 4.3 * zoomLevel,cameraX += 4.3 * zoomLevel;}, 40);
				const message = {type:'userAction',data:'ArrowUp+Left'};
				websocket.send(JSON.stringify(message));
			} else if (arrowDownPressed && arrowRightPressed){
				//intervalID = setInterval(function () {cameraY -= 4.3 * zoomLevel,cameraX -= 4.3 * zoomLevel;}, 40);
				const message = {type:'userAction',data:'ArrowDown+Right'};
				websocket.send(JSON.stringify(message));
			} else if (arrowDownPressed && arrowLeftPressed){
				//intervalID = setInterval(function () {cameraY -= 4.3 * zoomLevel,cameraX += 4.3 * zoomLevel;}, 40);
				const message = {type:'userAction',data:'ArrowDown+Left'};
				websocket.send(JSON.stringify(message));
			} else



			// 1o epipedo - 1 koumpi
			if (arrowUpPressed) {
			//intervalID = setInterval(function () {cameraY += 4.3 * zoomLevel;}, 40);
    		const message = {type: 'userAction', data: 'ArrowUp'};
    		websocket.send(JSON.stringify(message));
  			} else if (arrowDownPressed)  {	
			//intervalID = setInterval(function () {cameraY -= 4.3 * zoomLevel;}, 40);
    		const message = {type: 'userAction', data: 'ArrowDown'};
    		websocket.send(JSON.stringify(message));
  			} else if (arrowRightPressed) {	
			//intervalID = setInterval(function () {cameraX -= 4.3 * zoomLevel;}, 40);
    		const message = {type: 'userAction', data: 'ArrowRight'};
    		websocket.send(JSON.stringify(message));
  			} else if (arrowLeftPressed) {
			//intervalID = setInterval(function () {cameraX += 4.3 * zoomLevel;}, 40);
    		const message = {type: 'userAction', data: 'ArrowLeft'};
    		websocket.send(JSON.stringify(message));
			}
		}


		function sendUserProjectile(){
			const angle = Math.atan2(yaxis, xaxis); 	
			const message = {type:'userProjectile',data:angle};
			websocket.send(JSON.stringify(message));
		}

		// ----------------------------------------- End of Functions -----------------------------------------



		// ----------------------------------------- Start of Movement -----------------------------------------

		canvas.addEventListener('keydown',function(event){

			if (event.repeat) {
   				 return; // Ignore key repeats
  			}

			if (event.key === 'ArrowUp' || event.code === 'KeyW') {	
    		arrowUpPressed = true;
  			} else if (event.key === 'ArrowDown' || event.code === 'KeyS') {
    		arrowDownPressed = true;
  			} else if (event.key === 'ArrowRight' || event.code === 'KeyD') {
    		arrowRightPressed = true;
  			} else if (event.key === 'ArrowLeft' || event.code === 'KeyA') {
    		arrowLeftPressed = true;
  			}



			
			// 4o epipedo - 4 koumpia
			if (arrowUpPressed && arrowDownPressed && arrowRightPressed && arrowLeftPressed) {
			//clearInterval(intervalID); 
			const message = {type:'userAction',data:'ArrowNotClicked'};
			websocket.send(JSON.stringify(message));
			} else {

			handleKeyAction();

			}
			
		});

		canvas.addEventListener('keyup',function(event){

			if (event.key === 'ArrowUp' || event.code === 'KeyW') {
    		arrowUpPressed = false;
  			}
			if (event.key === 'ArrowDown' || event.code === 'KeyS') {
    		arrowDownPressed = false;
  			}
			if (event.key === 'ArrowRight' || event.code === 'KeyD') {
    		arrowRightPressed = false;
  			}
			if (event.key === 'ArrowLeft' || event.code === 'KeyA') {
    		arrowLeftPressed = false;
  			}



			handleKeyAction();


			// 0 epipedo - kanena koumpi
			if (!arrowUpPressed && !arrowDownPressed && !arrowRightPressed && !arrowLeftPressed){
				//clearInterval(intervalID);
				const message = {type:'userAction',data:'ArrowNotClicked'};
				websocket.send(JSON.stringify(message));
			}

		});

		// ----------------------------------------- End of Movement -----------------------------------------




		// ----------------------------------------- Start of Projectiles -----------------------------------------

		
		canvas.addEventListener('mousedown',function(event){
			
			if (event.button == 0) {
				isShooting = true;
				sendUserProjectile();
				myInterval = setInterval(function() {
					sendUserProjectile();
				},40);
			}	
		
		});

		canvas.addEventListener('mousemove', onMouseMove);
  
  		function onMouseMove(event) {
    		xaxis = event.clientX - canvas.width / 2;
    		yaxis = event.clientY - canvas.height / 2;
  		}
	
		canvas.addEventListener('mouseup',function(event){
			
			if (event.button == 0) {
				isShooting = false;
				clearInterval(myInterval);
				const message = {type:'userProjectile',data:'MouseNotClicked'};
				websocket.send(JSON.stringify(message));
			}
			
		});


		// ----------------------------------------- End of Projectiles -----------------------------------------

		



		// ----------------------------------------- Start of Other Event Listeners -----------------------------------------


		// to prevent right click
		canvas.addEventListener('contextmenu', function (event) {
            event.preventDefault();
        });

		// Update canvas size when the window is resized
		window.addEventListener('resize', updateCanvasSize);
		
		// for zoom
		canvas.addEventListener('wheel', handleMouseWheel);
		
		// to resize when page is resized
		document.addEventListener('visibilitychange', handleVisibilityChange);


		// ----------------------------------------- End of Other Event Listeners -----------------------------------------


	</script>
</body>
</html>
